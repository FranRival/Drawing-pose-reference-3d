<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Pose Reference Tool</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</head>

<body>

<div class="container">

    <div class="left-panel">
        <h3>Pose Controls</h3>

        <label>Brazo izquierdo</label>
        <input type="range" id="armL" min="-2" max="2" step="0.01">

        <label>Brazo derecho</label>
        <input type="range" id="armR" min="-2" max="2" step="0.01">

        <button id="downloadBtn">Descargar imagen</button>

    </div>

    <div class="right-panel">
        <canvas id="scene"></canvas>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
